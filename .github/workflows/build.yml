name: Build and Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# 全局配置
env:
  NODE_VERSION: '24'
  APP_NAME: ${{ github.event.repository.name }}
  OWNER_NAME: ${{ github.event.repository.owner.login }}


jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Prepare package metadata
        id: metadata
        shell: bash
        run: |
          jversion="0.1.0"
          
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            raw_tag="${{ github.ref_name }}"
            echo "Detected Tag: $raw_tag"
          
            # 去除 'v' 或 'V' 前缀 (支持 v1.0.0, V1.0.0, 1.0.0)
            version=$(echo "$raw_tag" | sed -E 's/^[vV]//')
          
            # 规范化版本 (只保留数字部分 x.y.z，去掉 -rc, -beta 等后缀用于 jpackage)
            jversion=$(echo "$version" | sed -E 's/^([0-9]+\.[0-9]+(\.[0-9]+)?).*/\1/')
          
            if [ -z "$jversion" ]; then
              echo "Warning: Could not parse numeric version from tag $raw_tag, defaulting to 0.1.0"
              jversion="0.1.0"
            fi
            echo "Using Tag Version: $version (JPackage: $jversion)"
          fi

          echo "jversion=$jversion" >> $GITHUB_OUTPUT

      - name: Create zip archive
        run: |
          cd dist
          zip -r ../${{ env.APP_NAME }}-${{ steps.metadata.outputs.jversion }}.zip .
          cd ..

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: node-dist
          path: ${{ env.APP_NAME }}-${{ steps.metadata.outputs.jversion }}.zip
          retention-days: ${{ (startsWith(github.ref, 'refs/tags/v') && 2) || 1 }}

  # ========== 发布到 GitHub Releases ==========
  release:
    needs: [ build ]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write  # ✅ 仅 release job 需要写权限
    environment: release  # ✅ 添加环境保护（可选：要求审批）

    steps:
      - name: Checkout code (for changelog)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # ✅ 必须获取完整 tag 历史

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true  # ✅ 简化目录结构

      - name: Generate release notes
        id: notes
        run: |
          # 获取上一个标签
          current_tag=${GITHUB_REF#refs/tags/}
          prev_tag=$(git tag --sort=-version:refname | grep -v "^$current_tag$" | head -1)
          
          body_content=""
          if [[ -n "$prev_tag" ]]; then
            body_content=$(git log --pretty=format:"* %s (%h)" "$prev_tag".."$current_tag" -- . ":(exclude)docs" ":(exclude).github")
          else
            body_content="Initial release or no previous tag found."
          fi
          
          # 写入输出，处理多行字符
          {
            echo "body<<EOF"
            echo "$body_content"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            ${{ steps.notes.outputs.body }}
            
            访问地址: https://${{ env.OWNER_NAME }}.github.io/${{ env.APP_NAME }}/${{ github.ref_name }}/
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}  # ✅ 自动识别预发布
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  # ========== 发布到 GitHub Pages ==========
  deploy:
    needs: [ release ]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write  # ✅ 仅 release job 需要写权限
      pages: write
      id-token: write
    environment: release  # ✅ 添加环境保护（可选：要求审批）

    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: gh-pages-output # 将旧版本检出到临时目录

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true  # ✅ 简化目录结构

      - name: Prepare new version folder
        run: |
          # 创建以标签名为名的文件夹
          VERSION_DIR="${{ github.ref_name }}"
          
          mkdir -pv ./gh-pages-output/$VERSION_DIR/
          rm -rf ./gh-pages-output/$VERSION_DIR/*
          
          unzip -o artifacts/${{ env.APP_NAME }}-*.zip -d ./gh-pages-output/$VERSION_DIR

      - name: Deploy to gh-pages (Preserving history)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages-output
          keep_files: true # 关键参数！保留未修改的文件（即旧版本）
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'

